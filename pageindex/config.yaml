# ==============================================================================
# PageIndex Model Configuration (TARGET 1.4)
# ==============================================================================

# Default Provider Selection
provider: "ollama"  # Options: "openai", "ollama", "hybrid"

# OpenAI Model Configuration (for fallback/compatibility)
model: "gpt-4o-2024-11-20"  # OpenAI model (128K context window)

# Ollama Model Configuration
# Using phi3:3.8b as default - Microsoft Phi-3 Mini (3.8B parameters)
# Excellent reasoning capabilities for small model size
ollama_model: "phi3:3.8b"  # Default 3B SLM (overridden by OLLAMA_MODEL env var)

# Alternative Ollama Models (can be set via OLLAMA_MODEL env var):
# - phi3:3.8b         → 3.8B, best balance (default)
# - gemma:2b          → 2B, fast but less capable
# - gemma:3b          → 3B Google Gemma
# - stablelm2:1.6b    → 1.6B, very fast
# - mistral:7b        → 7B, more capable but slower
# - llama3:8b         → 8B, highest quality

# Model Capabilities
model_config:
  openai:
    context_window: 128000
    supports_json_mode: true
    supports_streaming: true
  
  ollama:
    context_window: 4096  # phi3:3.8b context window
    supports_json_mode: false  # Most Ollama models
    supports_streaming: true

# Document Processing Configuration
toc_check_page_num: 20
max_page_num_each_node: 10
max_token_num_each_node: 20000
if_add_node_id: "yes"
if_add_node_summary: "yes"
if_add_doc_description: "no"
if_add_node_text: "no"